<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FareFlow Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .navbar {
            background-color: rgba(20, 24, 31, 0.95) !important;
            padding: 10px 50px;
        }
        .navbar-brand img { height: 40px; border-radius: 50%; }
        .nav-link { color: #b0b3b8 !important; font-size: 0.9rem; margin-right: 15px; }
        .nav-link:hover { color: white !important; }

        .page-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 120px); 
        }

        .registration-card {
            background: rgba(64, 115, 123, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            width: 850px;
            height: 580px; 
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 50px;
            background: rgba(255, 255, 255, 0.05);
        }

        .profile-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background-color: #72e2f8;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.2);
        }

        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }

        .custom-file-upload {
            background: white;
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 13px;
            cursor: pointer;
            width: 80%;
        }

        .right-panel {
            flex: 1.2;
            padding: 30px 40px;
            color: white;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .right-panel h2 {
            text-align: center;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
        }

        .form-label {
            font-size: 12px;
            margin-bottom: 3px;
            font-weight: 500;
        }

        .form-control {
            background: rgba(230, 230, 230, 0.9);
            border: none;
            border-radius: 4px;
            height: 32px;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .small-row { display: flex; gap: 10px; }
        .age-col { width: 60px; }
        .contact-col { flex: 1; }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-submit {
            background-color: #007bff;
            border: none;
            color: white;
            flex: 2;
            padding: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-reset {
            background-color: #6c757d;
            border: none;
            color: white;
            flex: 1;
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn-submit:hover { background-color: #0056b3; }
        .btn-reset:hover { background-color: #5a6268; }

        footer {
            background: rgba(0, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.7);
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            font-size: 13px;
        }
        
        .terms-check { font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="home.html">FareFlow</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">FareFlow</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="#" class="nav-link text-white me-3" style="text-decoration: underline;">Book Now</a>
                    <button class="btn btn-primary btn-sm px-3">Create Account</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="page-wrapper">
        <div class="registration-card">
            <div class="left-panel">
                <div class="profile-circle">
                    <img id="preview" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="User">
                </div>
                <div class="custom-file-upload">
                    <input type="file" id="fileInput" style="width: 100%; font-size: 10px;">
                </div>
            </div>

            <div class="right-panel">
                <h2>Registration</h2>
                <form id="regForm">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" required>

                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" required>

                    <div class="small-row">
                        <div class="age-col">
                            <label class="form-label">Age</label>
                            <input type="text" class="form-control">
                        </div>
                        <div class="contact-col">
                            <label class="form-label">Contact Number</label>
                            <input type="text" class="form-control">
                        </div>
                    </div>

                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" required>

                    <label class="form-label">Enter your username</label>
                    <input type="text" class="form-control" required>

                    <label class="form-label">Enter your password</label>
                    <input type="password" class="form-control" required>

                    <div class="terms-check">
                        <input type="checkbox" required> I accept the Terms of Use and Privacy Policy
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-submit">Sign Up</button>
                        <button type="reset" class="btn-reset">Reset</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer>
        Ducut, Mallari, Rivera | 9 Ruby ©2026
    </footer>

    <script>
        // Handle Image Preview
        document.getElementById('fileInput').onchange = function (evt) {
            var tgt = evt.target || window.event.srcElement,
                files = tgt.files;
            if (FileReader && files && files.length) {
                var fr = new FileReader();
                fr.onload = function () {
                    document.getElementById('preview').src = fr.result;
                }
                fr.readAsDataURL(files[0]);
            }
        }

        // Handle Form Submission and Redirection to Confirmation
        document.getElementById('regForm').onsubmit = function(e) {
            e.preventDefault(); 
            window.location.href = "confirmation.html"; 
        };
    </script>
</body>
</html>
