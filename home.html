<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAREFLOW - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957') no-repeat center center fixed;
            background-size: cover;
        }
        .glass-card {
            background: rgba(80, 120, 130, 0.7);
            border-radius: 15px;
            max-width: 900px;
            backdrop-filter: blur(5px);
        }
        .fare-header {
            background: rgba(0, 0, 0, 0.5);
            color: #ffc107;
            display: inline-block;
            border-radius: 5px;
        }
        .fare-display {
            background: #001a4d;
            border-radius: 10px;
            min-height: 150px;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="home.html">FareFlow</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="home.html">Home</a>
                <a class="nav-link" href="#">FareFlow</a>
            </div>
            <div>
                <button class="btn btn-outline-light btn-sm">Book Now</button>
                <a href="registration.html" class="btn btn-primary btn-sm">Create Account</a>
            </div>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <div class="glass-card mx-auto p-4 text-center text-white">
            <h2 class="fare-header p-2">Tracking Fare App</h2>
            <div class="row mt-4 align-items-center">
                <div class="col-md-4">
                    <img src="https://cdn.hotosm.org/website/Pampanga_animated_v2.gif" alt="Map" class="img-fluid rounded">
                </div>
                <div class="col-md-5 text-start">
                    <label>PICK-UP LOCATION:</label>
                    <input type="text" id="pickup" class="form-control mb-3" placeholder="e.g. Angeles">
                    <label>DROP-OFF LOCATION:</label>
                    <input type="text" id="dropoff" class="form-control mb-3" placeholder="e.g. Sta. Ana">
                    <div class="d-flex gap-2">
                        <button onclick="calculateFare(1)" class="btn btn-warning btn-sm">Regular Fare</button>
                        <button onclick="calculateFare(0.8)" class="btn btn-secondary btn-sm">Discounted Fare</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="fare-display p-3">
                        <p>Fare:</p>
                        <h1 id="result">0.00</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-white bg-dark py-3">
        Ducut, Mallari, Rivera | 9 Ruby ©2026
    </footer>

    <script>
        function calculateFare(discount) {
            let pickup = document.getElementById('pickup').value;
            let dropoff = document.getElementById('dropoff').value;
            let distance = pickup.length + dropoff.length;
            let baseFare = 50;
            let rawTotal = (baseFare + (distance * 10)) * discount;
            let finalFare = Math.round(rawTotal * 100) / 100; 
            document.getElementById('result').innerHTML = finalFare.toFixed(2);
        }
    </script>
</body>
</html>
